services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: solardb
      POSTGRES_USER: solar
      POSTGRES_PASSWORD: solar
    ports:
      - "5432:5432"

  api:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      - db

  test:
    build: .
    command: pytest -v
    env_file: .env
    # Les tests unitaires (mocks) ne dépendent pas de la DB
    # Pour des tests d'intégration futurs, ajouter: depends_on: [db]
