name: solardim

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: solardb
      POSTGRES_USER: solar
      POSTGRES_PASSWORD: solar
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U solar -d solardb"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  migrate:
    build: .
    command: alembic upgrade head
    env_file: .env
    depends_on:
      db:
        condition: service_healthy

  api:
    build: .
    expose:
      - "8000"
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    ports:
      - "80:80"
    depends_on:
      - api
    restart: unless-stopped

  test:
    build: .
    command: pytest -v
    env_file: .env

volumes:
  postgres_data:
