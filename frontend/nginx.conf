server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Compression gzip
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # En-têtes de sécurité
    add_header X-Frame-Options "SAMEORIGIN"        always;
    add_header X-Content-Type-Options "nosniff"    always;
    add_header Referrer-Policy "strict-origin"     always;

    # Assets Angular (noms hashés) — cache 1 an, immuables
    location ~* \.(js|css|woff2?|svg|png|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # index.html — jamais mis en cache (point d'entrée SPA)
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Proxy vers FastAPI — /api/projects → http://api:8000/projects
    location /api/ {
        proxy_pass         http://api:8000/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 90s;   # PVGIS peut prendre jusqu'à 60s
    }

    # SPA fallback : toutes les routes Angular → index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
